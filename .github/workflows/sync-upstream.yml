name: Sync fork with upstream
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main from upstream
        run: |
          git remote add upstream https://github.com/ruvnet/ruvector.git
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only
          git push origin main

      - name: Rebase arm64-fixes onto updated main
        run: |
          git fetch origin arm64-fixes
          git checkout arm64-fixes
          if git rebase main; then
            git push origin arm64-fixes --force-with-lease
            echo "arm64-fixes rebased successfully."
          else
            git rebase --abort
            echo "::warning::Rebase conflict on arm64-fixes. The ARM64 fix may need manual update."
          fi

      - name: Check if arm64-fixes is still needed
        run: |
          if ! grep -q 'as \*const i8' crates/ruvector-postgres/src/types/vector.rs && \
             ! grep -q 'as \*mut i8' crates/ruvector-postgres/src/types/vector.rs; then
            echo "::notice::Upstream has adopted the ARM64 c_char fix. Consider retiring the arm64-fixes branch."
          fi
